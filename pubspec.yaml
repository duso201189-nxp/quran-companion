name: quran_companion
description: Ứng dụng học Kinh Qur'an chuyên nghiệp — người thầy đồng hành.
publish_to: 'none'
version: 0.6.0+6

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  drift: ^2.18.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  intl: ^0.20.2
  just_audio: ^0.9.38
  # Backend Windows cho just_audio (mặc định chỉ có Android/iOS/web).
  just_audio_windows: ^0.2.2
  package_info_plus: ^10.2.0
  path: ^1.9.0
  path_provider: ^2.1.3
  scrollable_positioned_list: ^0.3.8
  shared_preferences: ^2.3.2
  sqlite3_flutter_libs: ^0.5.24
  uuid: ^4.4.0

dev_dependencies:
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  sqlite3: ^3.3.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/database/quran.sqlite

  fonts:
    # Văn bản Qur'an — font Mushaf chính thức của King Fahd Complex.
    - family: UthmanicHafs
      fonts:
        - asset: assets/fonts/UthmanicHafs.ttf
    # Tiêu đề Ả Rập (tên Surah...) — Naskh truyền thống.
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
        - asset: assets/fonts/NotoNaskhArabic-Bold.ttf
          weight: 700
    # Văn bản Latin (UI, bản dịch, phiên âm) — hỗ trợ đủ tiếng Việt.
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Italic.ttf
          style: italic
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
